{% extends 'base.html' %}
{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card border-0 shadow-sm rounded-4">
                <div class="card-header bg-dark text-white p-4">
                    <h5 class="mb-0 fw-bold"><i class="fas fa-clipboard-check me-2"></i>Field Update</h5>
                </div>
                <div class="card-body p-4">
                    <div class="bg-light p-3 rounded-3 mb-4">
                        <h6 class="fw-bold mb-1">{{ field.name }}</h6>
                        <p class="small text-muted mb-0">
                            <strong>Crop:</strong> {{ field.crop.name }}<br>
                            <strong>Planted:</strong> {{ field.crop.planting_date }}
                        </p>
                    </div>

                    <form method="POST">
                        {% csrf_token %}
                        
                        <div class="mb-3">
                            <label class="form-label-custom">Current Stage</label>
                            {{ form.stage }}
                        </div>

                        <div class="mb-4">
                            <label class="form-label-custom">Observations & Notes</label>
                            {{ form.notes }}
                            <div class="form-text">Visible to Admin coordinators.</div>
                        </div>

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-success w-100 fw-bold">SUBMIT UPDATES</button>
                            <a href="{% url 'dashboard' %}" class="btn btn-light border w-100">Back</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
